name: Deploy Quarto to Netlify
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libgit2-dev \
            libglpk-dev

      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.4.0-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-4.4.0-

      - name: Install R packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        run: |
          install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
          pak::pak(c(
            "dplyr", "tidyr", "tidyverse", "readxl",
            "stringr", "stringi", "ggplot2", "ggthemes",
            "ggiraph", "highcharter", "formattable",
            "scales", "crosstalk", "reactable", "DT",
            "repr", "googlesheets4", "shiny",
            "shinydashboard", "shinyWidgets"
          ))
        shell: Rscript {0}

      - name: Render Quarto
        run: quarto render
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Commit rendered site       # ← thêm bước này
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add _site/
          git diff --staged --quiet || git commit -m "update rendered site"
          git push

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: '_site'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
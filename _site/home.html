yêu cầu: KHDN là xưởng sản xuất cần qua hỗ trợ, kiểm tra, khắc phục gấp cho KH.","1. KH đã báo kỹ thuật Thành 0977357868 nhưng chưa được hỗ trợ\n2. KH phản ánh lắp điện NLMT nhưng tiền điện vẫn cao\n3. KH yêu cầu kỹ thuật qua hỗ trợ xử lý","1. KH chưa báo chi nhánh\n2. KH phản ánh sơ đồ đấu nối điện bị sai\n3. KH yêu cầu chi nhánh gửi lại 1 bản hợp đồng sơ đồ đấu nối để KH kiểm tra","1. KH đã báo giám đốc chi nhánh nhưng chưa được xử lý dứt điểm\n2. KH phản ánh NLMT bị hỏng không sử dụng được\n3. KH yêu cầu kỹ thuật qua hỗ trợ thay aptomat to hơn","1. KH đã LH kỹ thuật nhưng không nghe máy\n2. KH phản ánh NLMT lỗi BMS không nhận pin\n3. KH yêu cầu kỹ thuật liên hệ hỗ trợ","CN báo hộ: Nguyễn Văn Lâm\n464695\n1. KH đã báo CN\n \n2.KH phản ánh:  KH dùng NLMT hiện tại biến tần ko hoạt động, PIN lưu trữ thì báo 100% nhưng ko xả được\n3. KH yc KT qua kiểm tra gấp cho KH","KH chưa báo CN\n KH đang sd NLMT, nhưng hiện tại hệ thống ko hoạt động, ko phát được điện\nYC KT qua kiểm tra và xử lý","KH chưa báo CN\nHIện tại KH cần di dời thiết bị cách đấy khoảng 2-3m , nhờ KT qua hỗ trợ","KH chưa báo CN\nKH đang sử dụng tấm PIN NLMT của VCC, \nHiện tại KH thấy hiệu suất của tấm PIN bị giảm đến 60% so với năm ngoái\nKH YC KT qua kiểm tra và xử lý cho KH gấp","1. KH báo cn người hỗ trợ trước nhưng ko liên hệ được\n2. KH phản ánh: KH kết nối được app báo lỗi ngoại tuyến\n3. KH yêu cầu: Hỗ trợ, hướng dẫn KH sử dụng, KH hay bị gặp vấn đề này nhiều hỗ trợ KH dứt điểm giúp.","1. KH phản ánh: Camera bị rớt không kết nối được, và cả mật khẩu wifi\n2. KH yêu cầu: Hỗ trợ KH cài đặt lại camera.","KH phản ánh đã đặt cọc lắp đặt hệ thống điện năng lượng mặt trời 20 ngày rồi nhưng chưa co KT nào qua lắp cho KH. Yêu cầu xử lý gấp","KH chưa báo CN\nKH yêu cầu NVKT qua lại thiết bị inverter của KH \nSố liên hệ:","1. KH chưa báo CN\n2. KH phản ánh: Lỗi CP bị cúp điện dưới nhà, hiện tại điện ko sử dụng được.\n3. KH yêu cầu: Qua kiểm tra, hỗ trợ, khắc phục gấp cho KH giờ nhà KH đang ko có điện để sử dụng.","CN báo sự cố hộ KH\n1. KH phản ánh: Ắc quy, pin gần như ko hoạt động. Chỉ có bám tải, ivt hoạt động\n2. KH yêu cầu: Qua hỗ trợ, kiểm tra, xử lý sớm cho KH.","1. KH đã báo cn a Long gđ kỹ thuật, a Dương Đăng Minh chủ ký HĐ, a Vương lắp đặt.\n2. KH phản ánh: Bị nhảy áp liên tục 1 tháng phải nhảy 20 ngày rơi vào khoảng 2h đêm và 12h trưa ban ngày, và chập tối lúc GĐ đang vào sinh hoạt. CN nhiều lần xuống ktra và kiến nghị nhưng có câu trả lời KH ko được hài lòng lắm. Đặc biệt là a Long GĐ KT có thái độ là đổ cho GĐ tắt áp, KH bức xúc vì KH bỏ đồng tiền ra mà lại đổ lỗi cho nhà KH. KH cũng báo với a Dương Đăng Minh, a Minh cũng bảo là để cháu bảo ae xuống thế nọ thế kia khất để ra giêng để sửa mà giờ hết tháng rồi vẫn ko thấy đâu.\n3. KH yêu cầu: Đồng tiền của KH phải xứng đáng và thực hiện đúng trong HĐ là phải được 80 90% dung lượng điện mà tại làm sao đã lâu như thế rồi mà vấn để tình trạng này diễn ra. KH yêu cầu phía bên CN kiểm tra, xử lý dứt điểm tình trạng này cho KH.\n***SĐT liên hệ: 0945268772, chú Bồng","1. KH đã báo cn nhưng bạn nv kinh doanh a Vượng chuyển công tác nên chuyển cho a Phong, a Phong lại chuyển công tác cho số người mới nhưng chưa thấy.\n2. KH phản ánh: Biểu đồ biến tần tăng giảm đột biến, sụt pin về 0,pv về 0, tất cả đều về 0, thi thoảng còn bị mất điện. Hôm vừa rồi đầu xuân vào app báo thấy mất kết nối điện lưới trong khi nhà xung quanh vẫn có, sau khi xem tbao ở trên app lại ko có bất kỳ tbao nào về biến tần bị ngắt hay gì cả. KH Kbt có ai can thiệp vào app không\n3. KH yêu cầu: Kiểm tra biến tần cho KH, đã yêu cầu hãng xử lý rất nhiều lần rồi, nhưng giờ vẫn có tình trạng gặp lỗi. Ngoài ra KH yêu cầu là xử lý triệt để cho KH vì sắp tới mùa hè nó lên 3,4kw bị nhảy mà giờ còn kh thấy có tbao trên app.","KH đã báo CN\nKH đang dùng NLMT hiện tại bị lỗi biến tần, ko kết nối được app\nYC KT qua kiểm tra xử lý cho KH\nNOTE: địa chỉ hiện tại của KH: thôn phú mỹ, xã tiến thắng, Hà Nội","không hoạt động","KH chưa báo CN\nKH phản ánh: hệ thống bị lỗi, điện bật 10 -15s chớp 1 lần\nKH yêu cầu chuyển KT xuống xử lý gấp","KH đã báo CN: a Nguyễn Văn Hà\tnửa thasg nhưng chưa có ai đến hỗ trợ\nKH phản ánh hệ thống điện năng lượng mặt trời ko hoạt động\nKH yêu cầu xử lý gấp","1. KH đã báo cn\n2. KH phản ánh: camera 360 chưa kết nối được hệ thống điều khiển, chưa lên được tivi để xem và cũng như pccc rừng mùa khô.\n3. KH yêu cầu: Qua hỗ trợ kết nối lại hệ thống giúp KH\n***SĐT liên hệ: 0988867428, Anh Thức","cammera bị off 1 cai","1. KH chưa báo cn\n2. KH phản ánh: Cục pin lưu trữ đang ko hoạt động, ko sử dụng được.\n3. KH yêu cầu: Có KT qua kiểm tra, khắc phục tình trạng này cho KH.","1.Đã báo chi nhánh chưa: chưa báo \n2.Đã báo qua đâu: KH gọi TĐ\n3.KH phản ánh về vấn đề: KH sử dụng NLMT của VCC , hiện tại Inverter ko hoạt động  \n4. KH yêu cầu KT qua kiểm tra xử lý cho KH.","1. KH đã báo cn\n2. KH phản ánh: Vào được aio app smart home nhưng ko thấy có công tắc.\n3. KH yêu cầu: Qua hỗ trợ, kiểm tra thiết bị cho KH, KH sẵn sàng trả phí.","1.Đã báo chi nhánh chưa: chưa báo\n2.Đã báo qua đâu: DTV HPC\n3.KH phản ánh về vấn đề: Hiệu suất hệ thấp.\n4.KH yêu cầu KT qua kiểm tra cho KH","1.Đã báo chi nhánh chưa: đã báo\n2.Đã báo cho ai:  KT Thái\n3.Đã báo qua đâu: gọi điện\n4.KH phản ánh về vấn đề: KH không vào được APP theo dõi hiệu suất hệ NLMT.\n5.KH yêu cầu KT qua kiểm tra gấp cho KH.","1. KH chưa báo cn\n2. KH phản ánh: Sự cố từ TT_1772587360264 trước sau khi xử lý KH thấy hệ thống nlmt ko có ổn định, lâu lâu tự ngắt và phải bảo nv tắt 3 công tắc cp đi bật lại mãi mới được.\n3. KH yêu cầu: Kiểm tra lại hàng hóa xem có đúng với HĐ về chất lượng, hiệu suất không. Nếu có vấn đề thì thay mới tinh cho KH để hệ thống vận hành trơn tru.","KH yc ktra nguyên nhân xảy ra sự cố TT_1772849052506","1.Đã báo chi nhánh chưa: đã báo\n2.KH báo cho GĐ Trường \n3.Đã báo qua đâu: gọi điện\n4.KH phản ánh về vấn đề: Hệ NLMT bị sự cố đang không hoạt động.\n 5.KH yêu cầu KT qua kiểm tra gấp cho KH.","1. KH đã báo cn: a Nguyễn Đình Bằng bên nlmt\n2. KH phản ánh: Hệ thống inverter báo lỗi mã lỗi 01.M011 và ko đẩy ra sản lượng điện nlmt.\n3. KH yêu cầu: Điều KT qua hỗ trợ giúp KH.","1.Đã báo chi nhánh chưa: đã báo \n2.Đã báo cho ai:  NV Văn\n3.\tĐã báo qua đâu: gọi điện\n4.\tKH phản ánh về vấn đề: KH lắp 70 tấm pin hệ NLMT, hiện tại 1 tấm bị vỡ hỏng cần thay thế.\n5.\t KH yêu cầu KT qua kiểm tra gấp cho KH","1. Đã báo chi nhánh chưa: chưa báo\n2.KH gọi điện lên TĐ\n3.KH phản ánh về vấn đề: KH lắp hệ NLMT 11KW, từ thời điểm tư vấn KH được NVKD tư vấn hàng ngày vào buổi tối hệ sẽ xả 80% công suất tương đương tầm 8KW – 9KW. KH sử dụng được 1 năm tới T12/2025 mới phát hiện ra sau 2 tháng lắp đặt mỗi ngày hệ chỉ xả 4KW. T12/2025 KH có báo lên tổng đài và KT có về kiểm tra lại thiết bị, KT báo do lỗi pin và mang đi bảo hành. Sau khi bảo hành thì mang về cho KH và KH theo dõi mấy ngày nay pin cũng chỉ xả tầm 7KW, không đúng công suất như NVKD tư vấn. Tính ra thì KH đang phải bỏ ra 1 khoản tiền lớn nhưng hiệu suất sử dụng lại rất thấp.\n4.KH yêu cầu Kt kiểm tra lại pin và CN đưa ra phương án xử lý vấn đề thiệt hại kinh tế cho KH khi sử dụng điện NLMT không hiệu quả.","1. Kh chưa báo cn\n2. Kh phản ánh: Hiện tại ko có mắt cam nào xem đc, mạng thì vẫn bình thường\n3. Kh yc: Yc cn hỗ trợ","1. Kh đã báo cn\n2. Kh phản ánh: Hệ của kh dạo này sd có hiện tượng liên tục bị sập. Kh đã báo kt và kt phản hồi do kh sd quá tải nhưng từ khi lắp đến nay kh báo chỉ dùng bằng đó thiết bị chứ ko hơn\n3. kh yc: YC cn hỗ trợ sớm","- KH phản ánh nhân sự Lê Văn Anh mang thiết bị ivt đi bảo hành từ 8/12/2025  tới nay 16/1/2026 vẫn chưa có ivt gửi về cho KH. Đã rất lâu và thiệt hại rất nhiều, trước đấy có mang ắc quy đi BH cũng k được giờ mang ivt đi hơn tháng chưa thấy phản hồi \n- KH Yc ktra lại và phản hồi mang thiết bị về lắp đặt  lại cho KH","1. Đã báo CN: Chưa báo\n2. KH báo sự cố: 1 cục pin lưu trữ không vào điện và khi mất điện lưới hệ không tải điện vào để sử dụng.\n3. Kh yêu cầu: KT qua kiểm tra cho Kh","KH nội bộ VCC T12/2025 quay số trúng thưởng bếp từ đơn AIO, bếp không hoạt động. Yêu cầu Kt qua bảo hành gấp. \nQuà tặng trúng thưởng nên không có thông tin mã HĐ.","- Đối tác Công ty cổ phần SPT Việt Nam (sdt phản ánh 0975014010) tiếp tục gọi tđ phản ánh về vấn đề chậm trễ tiến độ và thiếu nhân lực thi công cho dự án Thi công lắp đặt hệ thống Chiller. \n- Kh báo hiện tại vẫn chậm tiến độ, cn ko thay đổi hay tiến triển thêm gì\n- Mã hợp đồng: 23092025/HĐTP-SPT-VIETTEL.\n- Kh yc: Yc TCT có biện pháp xử lý rõ ràng cho kh"],"Ngày bắt đầu":["08:00 31/03/2026","08:00 31/03/2026","08:00 31/03/2026","08:00 31/03/2026","08:00 31/03/2026","15:55 30/03/2026","15:37 30/03/2026","10:00 30/03/2026","14:55 30/03/2026","11:41 30/03/2026","11:30 30/03/2026","09:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","08:00 30/03/2026","16:08 26/03/2026","10:11 27/03/2026","10:43 26/03/2026","08:00 26/03/2026","09:32 26/03/2026","08:00 26/03/2026","14:58 25/03/2026","09:20 25/03/2026","15:34 24/03/2026","09:29 26/03/2026","15:09 24/03/2026","15:19 24/03/2026","08:45 24/03/2026","10:28 26/03/2026","14:29 23/03/2026","08:00 23/03/2026","08:00 23/03/2026","08:00 23/03/2026","09:44 20/03/2026","09:25 19/03/2026","08:00 16/03/2026","10:21 10/03/2026","08:00 09/03/2026","14:54 05/03/2026","15:09 03/03/2026","16:54 26/02/2026","13:30 23/02/2026","08:00 19/01/2026","08:00 14/01/2026","08:00 05/01/2026","08:00 10/12/2025"],"Ngày kết thúc":["14:00 31/03/2026","14:00 31/03/2026","09:00 01/04/2026","09:00 01/04/2026","09:00 01/04/2026","15:55 31/03/2026","15:37 31/03/2026","10:00 31/03/2026","14:55 31/03/2026","11:41 31/03/2026","11:30 31/03/2026","09:00 31/03/2026","09:00 31/03/2026","09:00 31/03/2026","09:00 31/03/2026","09:00 31/03/2026","09:00 31/03/2026","23:55 05/04/2026","09:00 31/03/2026","09:00 31/03/2026","09:00 05/04/2026","16:50 31/03/2026","08:35 31/03/2026","17:25 02/04/2026","16:05 31/03/2026","17:35 27/03/20 <script>
(function () {

  var activeKeys = null;

  function initFilter() {
    if (typeof crosstalk === 'undefined') { setTimeout(initFilter, 150); return; }
    var fh = new crosstalk.FilterHandle(CT_GROUP);
    fh.on('change', function (e) {
      activeKeys = (e.value && e.value.length > 0) ? e.value : null;
    });
  }
  initFilter();

  function getFilteredData() {
    if (!activeKeys) return FULL_DATA;
    var keySet = new Set(activeKeys.map(String));
    return FULL_DATA.filter(function (_, i) {
      return keySet.has(String(i + 1));
    });
  }

  function loadScript(url, cb) {
    if (document.querySelector('script[src="' + url + '"]')) { cb && cb(); return; }
    var s = document.createElement('script');
    s.src = url;
    s.onload = cb || function () {};
    s.onerror = function () { alert('Không load được: ' + url); };
    document.head.appendChild(s);
  }

  function setBtnState(btn, loading, label) {
    if (!btn) return;
    btn.disabled    = loading;
    btn.textContent = loading ? '⏳ Đang tạo...' : label;
  }

  /* ── EXCEL ── */
  window._taiExcel = function (btn) {
    function doExcel() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '⬇ Tải Excel');
        return;
      }
      var ws = XLSX.utils.json_to_sheet(rows, { header: COL_NAMES });
      ws['!cols'] = COL_NAMES.map(function (col) {
        return { wch: Math.max(Math.round((COL_WIDTHS[col] || 100) / 7), 8) };
      });
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Danh sach ticket');
      XLSX.writeFile(wb, 'danh_sach_ticket.xlsx');
      setBtnState(btn, false, '⬇ Tải Excel');
    }
    window.XLSX
      ? doExcel()
      : loadScript('https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js', doExcel);
  };

  /* ── PNG ── */
  window._taiPNG = function (btn) {
    function doPNG() {
      setBtnState(btn, true);
      var rows = getFilteredData();
      if (!rows.length) {
        alert('Không có dữ liệu để xuất!');
        setBtnState(btn, false, '📷 Tải PNG');
        return;
      }

      var totalWidth = COL_NAMES.reduce(function (s, col) {
        return s + (COL_WIDTHS[col] || 100);
      }, 0);

      var html = '<table style="border-collapse:collapse;font-size:13px;'
               + 'font-family:Arial,sans-serif;width:' + totalWidth + 'px;">'
               + '<colgroup>';
      COL_NAMES.forEach(function (col) {
        html += '<col style="width:' + (COL_WIDTHS[col] || 100) + 'px">';
      });
      html += '</colgroup><thead><tr>';
      COL_NAMES.forEach(function (col) {
        html += '<th style="background:#F5DEB3;border:1px solid #ccc;'
             +  'padding:6px 8px;text-align:center;white-space:normal;'
             +  'word-break:break-word;">' + col + '</th>';
      });
      html += '</tr></thead><tbody>';
      rows.forEach(function (row, idx) {
        var bg = idx % 2 === 0 ? '#ffffff' : '#f5f5f5';
        html += '<tr style="background:' + bg + '">';
        COL_NAMES.forEach(function (col) {
          var txt = (row[col] === null || row[col] === undefined) ? '' : String(row[col]);
          html += '<td style="border:1px solid #ccc;padding:5px 8px;'
               +  'white-space:normal;word-break:break-word;'
               +  'vertical-align:top;">' + txt + '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'position:fixed;top:-99999px;left:-99999px;'
                            + 'background:#ffffff;padding:16px;'
                            + 'width:' + (totalWidth + 32) + 'px;';
      wrapper.innerHTML = html;
      document.body.appendChild(wrapper);

      html2canvas(wrapper, {
        scale: 2,
        backgroundColor: '#ffffff',
        useCORS: true,
        width: wrapper.scrollWidth,
        height: wrapper.scrollHeight
      }).then(function (canvas) {
        document.body.removeChild(wrapper);
        var a = document.createElement('a');
        a.download = 'danh_sach_ticket.png';
        a.href = canvas.toDataURL('image/png');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setBtnState(btn, false, '📷 Tải PNG');
      }).catch(function (e) {
        document.body.removeChild(wrapper);
        alert('Lỗi PNG: ' + e.message);
        setBtnState(btn, false, '📷 Tải PNG');
      });
    }
    window.html2canvas
      ? doPNG()
      : loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js', doPNG);
  };

})();
</script>

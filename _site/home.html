ố hộ KH\n1. KH phản ánh: Ắc quy, pin gần như ko hoạt động. Chỉ có bám tải, ivt hoạt động\n2. KH yêu cầu: Qua hỗ trợ, kiểm tra, xử lý sớm cho KH.","1. KH đã báo cn a Long gđ kỹ thuật, a Dương Đăng Minh chủ ký HĐ, a Vương lắp đặt.\n2. KH phản ánh: Bị nhảy áp liên tục 1 tháng phải nhảy 20 ngày rơi vào khoảng 2h đêm và 12h trưa ban ngày, và chập tối lúc GĐ đang vào sinh hoạt. CN nhiều lần xuống ktra và kiến nghị nhưng có câu trả lời KH ko được hài lòng lắm. Đặc biệt là a Long GĐ KT có thái độ là đổ cho GĐ tắt áp, KH bức xúc vì KH bỏ đồng tiền ra mà lại đổ lỗi cho nhà KH. KH cũng báo với a Dương Đăng Minh, a Minh cũng bảo là để cháu bảo ae xuống thế nọ thế kia khất để ra giêng để sửa mà giờ hết tháng rồi vẫn ko thấy đâu.\n3. KH yêu cầu: Đồng tiền của KH phải xứng đáng và thực hiện đúng trong HĐ là phải được 80 90% dung lượng điện mà tại làm sao đã lâu như thế rồi mà vấn để tình trạng này diễn ra. KH yêu cầu phía bên CN kiểm tra, xử lý dứt điểm tình trạng này cho KH.\n***SĐT liên hệ: 0945268772, chú Bồng","1. KH đã báo cn nhưng bạn nv kinh doanh a Vượng chuyển công tác nên chuyển cho a Phong, a Phong lại chuyển công tác cho số người mới nhưng chưa thấy.\n2. KH phản ánh: Biểu đồ biến tần tăng giảm đột biến, sụt pin về 0,pv về 0, tất cả đều về 0, thi thoảng còn bị mất điện. Hôm vừa rồi đầu xuân vào app báo thấy mất kết nối điện lưới trong khi nhà xung quanh vẫn có, sau khi xem tbao ở trên app lại ko có bất kỳ tbao nào về biến tần bị ngắt hay gì cả. KH Kbt có ai can thiệp vào app không\n3. KH yêu cầu: Kiểm tra biến tần cho KH, đã yêu cầu hãng xử lý rất nhiều lần rồi, nhưng giờ vẫn có tình trạng gặp lỗi. Ngoài ra KH yêu cầu là xử lý triệt để cho KH vì sắp tới mùa hè nó lên 3,4kw bị nhảy mà giờ còn kh thấy có tbao trên app.","CN 0962600057 báo sự cố hộ KH, trước lắp đặt cho KH giờ chuyển công tác.\n1. KH phản ánh: Lỗi ivt ko hoạt động, ko nạp và xả ra được\n2. KH yêu cầu: Qua kiểm tra, khắc phục tình trạng này cho KH","KH đã báo CN\nKH đang dùng NLMT hiện tại bị lỗi biến tần, <script id="quarto-html-after-body" type="application/javascript">
  window.document.addEventListener("DOMContentLoaded", function (event) {
    const icon = "";
    const anchorJS = new window.AnchorJS();
    anchorJS.options = {
      placement: 'right',
      icon: icon
    };
    anchorJS.add('.anchored');
    const isCodeAnnotation = (el) => {
      for (const clz of el.classList) {
        if (clz.startsWith('code-annotation-')) {                     
          return true;
        }
      }
      return false;
    }
    const onCopySuccess = function(e) {
      // button target
      const button = e.trigger;
      // don't keep focus
      button.blur();
      // flash "checked"
      button.classList.add('code-copy-button-checked');
      var currentTitle = button.getAttribute("title");
      button.setAttribute("title", "Copied!");
      let tooltip;
      if (window.bootstrap) {
        button.setAttribute("data-bs-toggle", "tooltip");
        button.setAttribute("data-bs-placement", "left");
        button.setAttribute("data-bs-title", "Copied!");
        tooltip = new bootstrap.Tooltip(button, 
          { trigger: "manual", 
            customClass: "code-copy-button-tooltip",
            offset: [0, -8]});
        tooltip.show();    
      }
      setTimeout(function() {
        if (tooltip) {
          tooltip.hide();
          button.removeAttribute("data-bs-title");
          button.removeAttribute("data-bs-toggle");
          button.removeAttribute("data-bs-placement");
        }
        button.setAttribute("title", currentTitle);
        button.classList.remove('code-copy-button-checked');
      }, 1000);
      // clear code selection
      e.clearSelection();
    }
    const getTextToCopy = function(trigger) {
      const outerScaffold = trigger.parentElement.cloneNode(true);
      const codeEl = outerScaffold.querySelector('code');
      for (const childEl of codeEl.children) {
        if (isCodeAnnotation(childEl)) {
          childEl.remove();
        }
      }
      return codeEl.innerText;
    }
    const clipboard = new window.ClipboardJS('.code-copy-button:not([data-in-quarto-modal])', {
      text: getTextToCopy
    });
    clipboard.on('success', onCopySuccess);
    if (window.document.getElementById('quarto-embedded-source-code-modal')) {
      const clipboardModal = new window.ClipboardJS('.code-copy-button[data-in-quarto-modal]', {
        text: getTextToCopy,
